<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="starGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ff8800" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Estrella central -->
  <polygon
    points="60,10 72,42 106,42 79,62 90,96 60,75 30,96 41,62 14,42 48,42"
    fill="#ffdd00"
    filter="url(#glow)"
    opacity="0.95"
  />
  <!-- Destellos -->
  <line x1="60" y1="2" x2="60" y2="20" stroke="#fff" stroke-width="2" opacity="0.6"/>
  <line x1="60" y1="100" x2="60" y2="118" stroke="#fff" stroke-width="2" opacity="0.4"/>
  <line x1="2" y1="60" x2="20" y2="60" stroke="#fff" stroke-width="2" opacity="0.4"/>
  <line x1="100" y1="60" x2="118" y2="60" stroke="#fff" stroke-width="2" opacity="0.6"/>
</svg>
